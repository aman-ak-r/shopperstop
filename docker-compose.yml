services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quickbasket-backend
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    environment:
      - PORT=5001
    networks:
      - quickbasket-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: quickbasket-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - quickbasket-network

networks:
  quickbasket-network:
    driver: bridge
