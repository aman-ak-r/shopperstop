name: Deploy QuickBasket to AWS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      BACKEND_ECR_REPO_URI: ${{ vars.BACKEND_ECR_REPO_URI }}
      FRONTEND_ECR_REPO_URI: ${{ vars.FRONTEND_ECR_REPO_URI }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_BACKEND_SERVICE_NAME: ${{ vars.ECS_BACKEND_SERVICE_NAME }}
      ECS_FRONTEND_SERVICE_NAME: ${{ vars.ECS_FRONTEND_SERVICE_NAME }}
      ECS_BACKEND_TASK_FAMILY: ${{ vars.ECS_BACKEND_TASK_FAMILY }}
      ECS_FRONTEND_TASK_FAMILY: ${{ vars.ECS_FRONTEND_TASK_FAMILY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        run: |
          docker build \
            -t $BACKEND_ECR_REPO_URI:$IMAGE_TAG \
            -t $BACKEND_ECR_REPO_URI:latest \
            -f server/Dockerfile ./server

      - name: Build frontend image
        run: |
          docker build \
            -t $FRONTEND_ECR_REPO_URI:$IMAGE_TAG \
            -t $FRONTEND_ECR_REPO_URI:latest \
            -f client/Dockerfile ./client

      - name: Push backend image
        run: |
          docker push $BACKEND_ECR_REPO_URI:$IMAGE_TAG
          docker push $BACKEND_ECR_REPO_URI:latest

      - name: Push frontend image
        run: |
          docker push $FRONTEND_ECR_REPO_URI:$IMAGE_TAG
          docker push $FRONTEND_ECR_REPO_URI:latest

      - name: Download current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_BACKEND_TASK_FAMILY" \
            --query taskDefinition > backend-task-definition.json
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' backend-task-definition.json > backend-task-definition-clean.json

      - name: Render backend task definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend-task-definition-clean.json
          container-name: backend
          image: ${{ env.BACKEND_ECR_REPO_URI }}:${{ env.IMAGE_TAG }}

      - name: Deploy backend task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ env.ECS_BACKEND_SERVICE_NAME }}
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true

      - name: Download current frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_FRONTEND_TASK_FAMILY" \
            --query taskDefinition > frontend-task-definition.json
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' frontend-task-definition.json > frontend-task-definition-clean.json

      - name: Render frontend task definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend-task-definition-clean.json
          container-name: frontend
          image: ${{ env.FRONTEND_ECR_REPO_URI }}:${{ env.IMAGE_TAG }}

      - name: Deploy frontend task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.ECS_FRONTEND_SERVICE_NAME }}
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
